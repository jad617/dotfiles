# =============================================================================
# Hyprpaper — wallpaper daemon
# =============================================================================

splash = false

# Preload all wallpapers so switching is instant
preload = ~/Pictures/Wallpapers/quasar.webp
preload = ~/Pictures/Wallpapers/kurzgesagt.webp
preload = ~/Pictures/Wallpapers/kurzgesagt-galaxies.webp

# Active wallpaper — change the right-hand side to switch
wallpaper = ,~/Pictures/Wallpapers/quasar.webp

# Multi-monitor example:
# wallpaper = DP-1,~/Pictures/Wallpapers/quasar.webp
# wallpaper = HDMI-A-1,~/Pictures/Wallpapers/kurzgesagt-galaxies.webp
