# =============================================================================
# Hyprlock — GPU-rendered lock screen
# Catppuccin Macchiato
# =============================================================================

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor =
    path       = ~/Pictures/Wallpapers/quasar.webp
    blur_passes = 3
    blur_size   = 7
    noise       = 0.0117
    contrast    = 0.8916
    brightness  = 0.8172
    vibrancy    = 0.1696
}

# Clock — large, centered above input
label {
    monitor =
    text      = cmd[update:1000] echo "$(date +'%H:%M')"
    color     = rgba(cad3f5ff)
    font_size = 72
    font_family = MesloLGS NF Bold
    position  = 0, 200
    halign    = center
    valign    = center
}

# Date
label {
    monitor =
    text      = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color     = rgba(a5adcbff)
    font_size = 20
    font_family = MesloLGS NF
    position  = 0, 130
    halign    = center
    valign    = center
}

# Password input field
input-field {
    monitor =
    size             = 300, 55
    outline_thickness = 2
    dots_size        = 0.33
    dots_spacing     = 0.15
    dots_center      = true

    outer_color  = rgb(c6a0f6)
    inner_color  = rgb(24273a)
    font_color   = rgb(cad3f5)

    fade_on_empty   = false
    placeholder_text = <span foreground="##a5adcb"> Enter Password...</span>
    hide_input       = false

    check_color      = rgb(a6da95)
    fail_color       = rgb(ed8796)
    fail_text        = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color   = rgb(eed49f)

    position = 0, -80
    halign   = center
    valign   = center
}
