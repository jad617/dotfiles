# =============================================================================
# Hyprland configuration — Catppuccin Macchiato
# GTX 1070 / NixOS
# =============================================================================

# ---------------------------------------------------------------------------
# Wayland environment
# ---------------------------------------------------------------------------
env = XDG_SESSION_TYPE,wayland
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = _JAVA_AWT_WM_NONREPARENTING,1
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# ---------------------------------------------------------------------------
# Monitor config — sourced from monitors.conf (managed by nwg-displays)
# Fallback for any unmatched monitor:
# ---------------------------------------------------------------------------
source = ~/.config/hypr/monitors.conf
monitor = ,preferred,auto,1

# ---------------------------------------------------------------------------
# Autostart
# ---------------------------------------------------------------------------
exec-once = bash -c 'rm -f /run/user/$(id -u)/astal/hyprpanel.sock; hyprpanel'
exec-once = kanshi
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = blueman-applet
exec-once = /run/current-system/sw/bin/wezterm

# ---------------------------------------------------------------------------
# Input
# ---------------------------------------------------------------------------
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll   = false
        disable_while_typing = true
    }
}

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
general {
    gaps_in  = 8
    gaps_out = 16
    border_size = 2

    # Catppuccin Macchiato — mauve → blue gradient on active, surface0 on inactive
    col.active_border   = rgba(c6a0f6ff) rgba(8aadf4ff) 45deg
    col.inactive_border = rgba(363a4f99)

    layout = dwindle
    allow_tearing  = false
    resize_on_border = true
}

# ---------------------------------------------------------------------------
# Decoration
# ---------------------------------------------------------------------------
decoration {
    rounding = 12

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    active_opacity     = 1.0
    inactive_opacity   = 1.0
    fullscreen_opacity = 1.0
}

# ---------------------------------------------------------------------------
# Animations — smooth, not excessive
# ---------------------------------------------------------------------------
animations {
    enabled = false
}

# ---------------------------------------------------------------------------
# Layouts
# ---------------------------------------------------------------------------
dwindle {
    pseudotile      = true
    preserve_split  = true
    smart_resizing  = true
}

master {
    new_status = master
}

# ---------------------------------------------------------------------------
# Miscellaneous
# ---------------------------------------------------------------------------
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    animate_manual_resizes  = true
    focus_on_activate       = true
}

# ---------------------------------------------------------------------------
# Window rules
# ---------------------------------------------------------------------------
windowrule = float on,      match:class pavucontrol
windowrule = size 900 600,  match:class pavucontrol
windowrule = center on,     match:class pavucontrol
windowrule = float on,      match:class blueman-manager
windowrule = size 900 600,  match:class blueman-manager
windowrule = center on,     match:class blueman-manager
windowrule = float on,      match:class nm-connection-editor
windowrule = float on,      match:class org.gnome.Nautilus
windowrule = float on,      match:class org.gnome.Calendar
windowrule = size 900 700,  match:class org.gnome.Calendar
windowrule = center on,     match:class org.gnome.Calendar

# Wofi launcher
windowrule = float on,   match:class wofi
windowrule = center on,  match:class wofi

# Firefox picture-in-picture
windowrule = float on, match:title Picture-in-Picture
windowrule = pin on,   match:title Picture-in-Picture

# ---------------------------------------------------------------------------
# Keybinds
# Modifier: SUPER (Win key)
# ---------------------------------------------------------------------------

# ── Launchers ───────────────────────────────────────────────────────────────
bind = SUPER,       RETURN, exec, wezterm
bind = SUPER,       D,      exec, pkill wofi || wofi --show drun
bind = SUPER,       E,      exec, nautilus
bind = SUPER,       B,      exec, google-chrome-stable
bind = CTRL ALT,    H,      exec, pkill wofi || cliphist list | wofi --show dmenu | cliphist decode | wl-copy

# ── Screenshots ─────────────────────────────────────────────────────────────
bind = ,            PRINT,  exec, grimblast copy area
bind = SHIFT,       PRINT,  exec, grimblast copy output
bind = SUPER SHIFT, S,      exec, flameshot gui
bind = SUPER,       PRINT,  exec, grimblast copysave output ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Window management ────────────────────────────────────────────────────────
bind = SUPER,       Q,      killactive
bind = SUPER,       F,      fullscreen, 0
bind = SUPER SHIFT, F,      fullscreen, 1
bind = SUPER,       V,      togglefloating
bind = SUPER,       P,      pseudo
bind = SUPER,       G,      togglegroup
bind = SUPER,       L,      exec, swaylock

# ── Focus — arrow keys (and hjk; right is reserved for lock) ────────────────
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d
bind = SUPER, H,     movefocus, l
bind = SUPER, J,     movefocus, d
bind = SUPER, K,     movefocus, u

# ── Move windows ─────────────────────────────────────────────────────────────
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d
bind = SUPER SHIFT, H,     movewindow, l
bind = SUPER SHIFT, J,     movewindow, d
bind = SUPER SHIFT, K,     movewindow, u
bind = SUPER SHIFT, L,     movewindow, r

# ── Resize ────────────────────────────────────────────────────────────────────
binde = SUPER ALT, left,  resizeactive, -50 0
binde = SUPER ALT, right, resizeactive,  50 0
binde = SUPER ALT, up,    resizeactive, 0 -50
binde = SUPER ALT, down,  resizeactive, 0  50
binde = SUPER ALT, H,     resizeactive, -50 0
binde = SUPER ALT, L,     resizeactive,  50 0
binde = SUPER ALT, K,     resizeactive, 0 -50
binde = SUPER ALT, J,     resizeactive, 0  50

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1
bind = CTRL ALT,       up,   workspace,       e-1
bind = CTRL ALT,       down, workspace,       e+1
bind = CTRL ALT SHIFT, up,   movetoworkspace, e-1
bind = CTRL ALT SHIFT, down, movetoworkspace, e+1

# Special workspace (scratchpad)
bind = SUPER,       S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# ── Media / Volume ───────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioPrev,         exec, playerctl previous
bind = , XF86AudioNext,         exec, playerctl next

# ── Brightness (useful for external displays with DDC support) ───────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# ── Mouse window actions ─────────────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
